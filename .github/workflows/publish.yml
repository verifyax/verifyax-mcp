name: Publish

# Manual, opt-in publishing (CLAUDE.md: publish manually until volume justifies
# automation). Trigger from the Actions tab once npm auth (NPM_TOKEN secret) and
# the @verifyax org are in place. Bump versions and tag the release first.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run pnpm publish in --dry-run mode (no upload)'
        type: boolean
        default: true

permissions:
  contents: read
  # Required for npm provenance (OIDC) on the real publish.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check version consistency
        run: pnpm check:versions

      - name: Build
        run: pnpm build

      # Gate the publish on the full deterministic suite, not just unit tests.
      # (Live-API drift is caught continuously by the integration job on `main`.)
      - name: Unit tests
        run: pnpm test:coverage

      - name: Conformance test
        run: pnpm test:conformance

      - name: Publish (dry run)
        if: ${{ inputs.dry_run }}
        run: pnpm -r publish --access public --no-git-checks --dry-run

      - name: Publish
        if: ${{ !inputs.dry_run }}
        run: pnpm -r publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
