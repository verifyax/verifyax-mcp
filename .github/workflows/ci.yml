name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      # Exercise the minimum supported Node (engines: >=20) as well as current.
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check version consistency
        # On a tag build, also assert the tag matches the package version.
        run: pnpm check:versions
        env:
          EXPECT_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '' }}

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Build (type-checks via tsc -b project references)
        run: pnpm build

      - name: Unit tests (with coverage thresholds)
        run: pnpm test:coverage

      - name: Conformance test (spawns the built MCP server)
        run: pnpm test:conformance

  integration:
    # Hits the live API. Runs on pushes to main (not PRs, where secrets are
    # unavailable). The suite self-skips when VERIFYAX_TEST_KEY is empty.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Integration tests
        run: pnpm test:integration
        env:
          VERIFYAX_TEST_KEY: ${{ secrets.VERIFYAX_TEST_KEY }}
          VERIFYAX_TEST_AGENT_URL: ${{ secrets.VERIFYAX_TEST_AGENT_URL }}
