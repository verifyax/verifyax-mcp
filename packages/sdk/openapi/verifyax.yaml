  /v1/agents/tests/a2a-connection:
    post:
      tags: [Agents]
      summary: Test A2A agent connection (card, message, mini simulations)
      description: >
        Full A2A onboarding connectivity test: fetches the agent card, sends a synchronous
        message probe, and optionally starts background mini scenario simulations when
        `agent_uuid` and tenant UUIDs are present (injected from the API key on the public
        surface). Poll the agent record for `testing` status when `testing_started` is true.
      operationId: testA2aConnection
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/A2AConnectionTestRequest"
            example:
              agent_url: https://example.com/.well-known/agent.json
              agent_type: A2A
              message: Hello from VerifyAX connection test
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/A2AConnectionTestResponse"
        "400":
          description: Missing agent_url or invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/agents/tests/a2a-message:
    post:
      tags: [Agents]
      summary: Test A2A message probe
      description: >
