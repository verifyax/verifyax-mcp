        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/engine/workspace-credit-preview:
    post:
      tags: [Engine]
      summary: Preview workspace credits (scenario run or scenario generation)
      description: >
        Unified credit preview: organisation balance, pending ENGINE verification runs and
        scenario_creation jobs (with stored estimates), and either `newRunEstimatedCredits`
        (`mode: scenario_run`) or `newGenerationEstimatedCredits` (`mode: scenario_generation`).
        The estimate field that does not apply is `null`. Tenant UUIDs in the body are
        overwritten by the gateway from the API key (see API overview).
      operationId: previewWorkspaceCredits
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditPreviewRequest"
            examples:
              scenario_run:
                summary: Scenario run estimate
                description: Tenant UUIDs optional — gateway injects them from the API key.
                value:
                  mode: scenario_run
                  organization_uuid: 00000000-0000-0000-0000-000000000010
                  workspace_uuid: 00000000-0000-0000-0000-000000000020
                  scenario_uuid: 00000000-0000-0000-0000-000000000001
                  num_runs: 2
                  timeout_minutes: 30
              scenario_generation:
                summary: Scenario generation estimate
                description: Tenant UUIDs optional — gateway injects them from the API key.
                value:
                  mode: scenario_generation
                  num_scenarios: 3
      responses:
        "200":
          description: Credit preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditPreviewResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: >
            Scenario row exists but its `scenario.json` artifact has not been uploaded yet
            (see issue #2370). Use `POST /v1/scenarios/generate` to create a fully-formed scenario.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioDefinitionMissingError"
              example:
                detail:
                  error: scenario_definition_missing
                  message: >-
                    Scenario has no definition uploaded. Use POST /v1/scenarios/generate
                    to create a fully-formed scenario.
                  scenario_uuid: 00000000-0000-0000-0000-000000000001
                  scenario_path: orgs/<org>/scenarios/<scenario>/scenario.json
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/engine/simulate/scenario:
    post:
      tags: [Engine]
      summary: Trigger scenario simulation
      description: Starts a scenario simulation; supports evaluate_on_complete and multiple runs.
      operationId: simulateScenario
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EngineInterrogateScenarioRequest"
            example:
              scenario_uuid: 00000000-0000-0000-0000-000000000001
              agent_uuid: 00000000-0000-0000-0000-000000000002
              evaluate_on_complete: true
              num_runs: 1
              timeout_minutes: 30
      responses:
        "200":
          description: Simulation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartSimulationResponse"
              example:
                job_uuid: 11111111-1111-1111-1111-111111111111
                simulation_uuid: 22222222-2222-2222-2222-222222222222
                evaluation_job_uuid: null
                status: dispatched
                message: Scenario simulation task(s) dispatched successfully (1 run(s))
                simulation_uuids:
                  - 22222222-2222-2222-2222-222222222222
                run_group_uuid: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: >
            Scenario row exists but its `scenario.json` artifact has not been uploaded yet
            (see issue #2370). Use `POST /v1/scenarios/generate` to create a fully-formed scenario.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioDefinitionMissingError"
              example:
                detail:
                  error: scenario_definition_missing
                  message: >-
                    Scenario has no definition uploaded. Use POST /v1/scenarios/generate
                    to create a fully-formed scenario.
                  scenario_uuid: 00000000-0000-0000-0000-000000000001
                  scenario_path: orgs/<org>/scenarios/<scenario>/scenario.json
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/engine/evaluate/trigger:
    post:
      tags: [Engine]
      summary: Trigger evaluation
