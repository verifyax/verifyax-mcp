        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/agents/tests/api-agent-test-directline:
    post:
      tags: [Agents]
      summary: Test Copilot Studio via Direct Line
      description: >
        Probes a Microsoft Copilot Studio agent using a Direct Line secret **before registration**.
