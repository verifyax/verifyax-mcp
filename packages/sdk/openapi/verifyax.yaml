  /v1/agents:
    get:
      tags: [Agents]
      summary: List agents
      description: Lists agents registered in the workspace with optional type filter and pagination.
      operationId: listAgents
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/AgentType"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: List agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"
    post:
      tags: [Agents]
      summary: Create agent
      description: Registers an agent endpoint (A2A, API, Direct Line, etc.) for use in simulations and tests.
      operationId: createAgent
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentCreateRequest"
            examples:
              a2a:
                summary: A2A agent
                value:
                  name: Support Agent
                  description: Agent for handling customer support requests
                  agent_url: https://agent.example.com/api
                  agent_type: A2A
                  agent_parameters:
                    auth_method: bearer
                    token: sk-example-token-min-10-chars
                    timeout: 15000
              directline:
                summary: Copilot Studio (Direct Line)
                description: >
                  Set `agent_url` from `directline.region` (see DirectlineAgentParameters).
                  Store the Direct Line secret under `agent_parameters.directline.secret`.
                value:
                  name: Copilot Studio Support Bot
                  description: Microsoft Copilot Studio agent over Direct Line 3.0
                  agent_url: https://directline.botframework.com
                  agent_type: DIRECTLINE
                  agent_parameters:
                    directline:
                      secret: "<direct-line-secret-from-copilot-studio>"
                      region: global
                    include_full_scenario: first_only
                    include_message_history: false
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/agents/{agent_uuid}:
    get:
      tags: [Agents]
      summary: Get agent by UUID
