openapi: 3.0.3
info:
  title: VerifyAX Gateway Public API
  version: 1.0.0
  license:
    name: Proprietary
    url: https://conscium.com/terms-of-use
  description: >
    Public HTTP API exposed by the VerifyAX gateway under `/api`.

    **Tenant scoping:** On proxied `POST`, `PUT`, and `PATCH` bodies (except
    `PATCH /v1/scenarios/{scenario_uuid}/artifacts`), the gateway sets
    `organization_uuid`, `workspace_uuid`, and `user_uuid` from the authenticated API key.
    Client-supplied values for those fields are **overwritten** before the request reaches
    verifyax-api. The same tenant fields are also set on query strings for `GET`/`DELETE`.
    API keys must be bound to a user. Example request bodies in this document may still
    show tenant UUIDs for clarity; treat them as illustrative — the gateway replaces them.
    Response bodies may include tenant fields returned by verifyax-api (resource metadata,
    usage events, etc.).

    **Rate limiting:** Public `/api/v1` requests are limited per workspace. Responses include
    `RateLimit-*` headers; exceeding the limit returns **429** with `Retry-After`.
servers:
  - url: /api
    description: Gateway public API base path
tags:
  - name: Auth
    description: One-time login tokens for browser sign-in from API-authenticated context.
  - name: Tickets
    description: Open feedback or help/support tickets for the API key's user.
  - name: Scenarios
    description: Simulation scenarios (generation, copies, artifact reads).
  - name: Jobs
    description: Async Celery-backed jobs (scenario creation, engine runs, evaluations, etc.).
  - name: Agents
    description: Registered agent endpoints (A2A, API, extension) and connectivity tests.
  - name: Engine
    description: Start simulation runs, preview credits, and trigger evaluations.
  - name: Billing
    description: Read-only billing balances for API-key tenants.
  - name: Simulations
    description: List, fetch, cancel, and delete simulation runs (`simulation_uuid` in paths).
  - name: Audit Logs
    description: Read-only organization audit events with filters and pagination.
  - name: Usage
    description: Workspace usage events and per-call LLM usage for spend analysis.
  - name: Skill Tags
    description: >
      Scenario skill tag catalogue for scenario generation (`GET /v1/tags`). Use tag `name`
      values in `POST /v1/scenarios/generate`; filter by `allowed_scenario_types` for your
      `scenario_type` before calling generate.
  - name: Client Tags
    description: Register organization-specific QnA skill tags for interview scenarios.
security:
  - BearerApiKeyAuth: []
paths:
  /v1/auth/one-time-login-token:
    post:
      tags: [Auth]
      summary: Create one-time login token
      description: >
        Creates a one-time token using API-key authenticated context. Response `example_links`
        put the token in the URL fragment (`#one-time-login-token=...`) so static hosts and
        cross-origin Referer headers do not receive the secret; the user-webapp redeems it via POST.
        The webapp does not read the token from the query string.
      operationId: createOneTimeLoginToken
      responses:
        "200":
          description: Token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OneTimeLoginTokenResponse"
        "400":
          description: Missing user, organization, or workspace context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/tickets:
    post:
      tags: [Tickets]
      summary: Open a ticket
      description: >
        Opens a ticket (a feedback or help/support message) on behalf of the API key's user.
        The user identity is taken from the API key and the email is resolved server-side, so
        only `message` (and optional `type`) are sent in the body. `type` defaults to
        `help_support`. Returns **400** if the user account has no email address, and **404**
        if the API key's user account cannot be found.
      operationId: createTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketCreate"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketResponse"
        "400":
          description: Empty message, invalid type, or the user account has no email address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: The user account associated with the API key was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/billing/balance:
    get:
      tags: [Billing]
      summary: Get billing balance
      description: Returns read-only billing balance fields for the API key tenant.
      operationId: getBillingBalance
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      responses:
        "200":
          description: Billing balance fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicBillingBalanceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/scenarios:
    get:
      tags: [Scenarios]
      summary: List scenarios
      description: >
        Lists scenario rows with optional `scenario_type`, `status`, `limit`, and `offset`
        filters. Default `limit` upstream is 100 (max 1000).
      operationId: listScenarios
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/ScenarioType"
        - $ref: "#/components/parameters/Status"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: List scenarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScenarioResponse"
        "400":
          description: Invalid scenario_type or status filter value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"
    post:
      tags: [Scenarios]
      summary: Create scenario shell
      description: >
        **Step 1 of a 2-step JSON import.** Creates an empty scenario row synchronously (no
        `scenario_creation` job). The scenario is **not runnable** until step 2: uploading
        the definition via `PATCH /v1/scenarios/{uuid}/artifacts`. Starting a run on a shell
        before the artifacts are uploaded returns **409 `scenario_definition_missing`** from
        `/v1/engine/simulate/scenario` and `/v1/engine/workspace-credit-preview`. Use
        `scenario_type: info_exchange` for JSON imports. Sending `corpus_uuid` returns **400**.
        `job_uuid` in the response is null. Prefer `POST /v1/scenarios/generate` if you want
        a fully-formed scenario in one call.

        **Developer-only:** requires the API-key owner's Auth0 user to have the platform
        `developer` role (enforced by the gateway via Auth0 Management API).
      operationId: createScenario
      x-developer-only: true
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScenarioCreateRequest"
            example:
              name: Imported Scenario
              description: Scenario imported from JSON
              scenario_type: info_exchange
      responses:
        "201":
          description: Created scenario shell
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCreateResponse"
              example:
                uuid: 00000000-0000-0000-0000-000000000001
                name: Imported Scenario
                description: Scenario imported from JSON
                scenario_type: info_exchange
                job_uuid: null
        "400":
          description: Missing scenario_type, invalid enum, or corpus_uuid sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: API-key owner lacks Auth0 developer role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Name already exists in workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/scenarios/generate:
    post:
      tags: [Scenarios]
      summary: Generate scenario
      description: >
        Queues LLM scenario_creation work. Returns the scenario row (`uuid`, not
        `scenario_uuid`) plus `job_uuid`. When num_scenarios is greater than 1, creates a batch
        (`batch_uuid`, `batch_scenario_uuids`) and requires `tag_pool`. Runs a billing credit
        preflight before enqueueing (**402** when balance is insufficient, **502** when billing is
        unreachable). Tenant UUIDs are injected by the gateway from the API key. Use the returned
        `uuid` as the `scenario_uuid` path parameter on `/v1/scenarios/{scenario_uuid}/...`.
      operationId: generateScenario
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulationScenarioCreateRequest"
            example:
              name: Product Return Flow
              scenario_type: interview
              tags: [anger_deescalation, empathy]
              context_prompt: Customer wants to return a damaged item bought 2 weeks ago
      responses:
        "201":
          description: Created scenario with scenario_creation job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCreateResponse"
              example:
                uuid: 00000000-0000-0000-0000-000000000001
                name: Product Return Flow
                scenario_type: interview
                status: null
                job_uuid: 11111111-1111-1111-1111-111111111111
                batch_uuid: null
                batch_scenario_uuids: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Insufficient workspace credits for estimated generation cost
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Name already exists in workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "422":
          description: Request body failed Pydantic validation (tag caps, batch rules, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"
        "502":
          description: Billing preflight could not reach the billing service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /v1/scenarios/generate-from-qna:
    post:
      tags: [Scenarios]
      summary: Generate interview scenario from Q&A
      description: >
        Creates a fixed-question **interview** scenario from inline Q&A pairs (for example
        `l3_qna_benchmark.json` output). Enqueues `scenario_creation` and returns the scenario
        row plus `job_uuid`. Tenant UUIDs are injected by the gateway from the API key.
      operationId: generateScenarioFromQna
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateScenarioFromQnaRequest"
            example:
              name: Latin QnA interview
              context_prompt: Latin dance history
              questions:
                - question: What is salsa?
                  correct_answer: A partner dance with Afro-Cuban roots.
                  is_hallucination_trap: false
      responses:
        "201":
          description: Created scenario with scenario_creation job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCreateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Request body failed validation (empty questions, too many items, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/scenarios/{scenario_uuid}:
    get:
      tags: [Scenarios]
      summary: Get scenario by UUID
      description: >
        Returns scenario metadata, definition paths, optional `scenario_creation_job_status`,
        complexity fields, etc.
      operationId: getScenario
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/ScenarioUuid"
      responses:
        "200":
          description: Scenario details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Scenario not in the authenticated workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Scenario not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"
    patch:
      tags: [Scenarios]
      summary: Update scenario by UUID
      description: Partial metadata update (name and description only).
      operationId: updateScenario
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/ScenarioUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScenarioUpdateRequest"
            example:
              name: Customer Support L2 - Revised
              description: Updated description for scenario tuning
      responses:
        "200":
          description: Updated scenario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Scenario not in the authenticated workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Scenario not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"
    delete:
      tags: [Scenarios]
      summary: Delete scenario by UUID
      description: >
        Deletes the scenario in the current workspace context. Returns **409** when the scenario
        still has any non-deleted simulation run pointing at it.
      operationId: deleteScenario
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/ScenarioUuid"
      responses:
        "204":
          description: Scenario deleted (no response body)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Scenario not in the authenticated workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Scenario not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Scenario still has non-deleted simulation runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/scenarios/{scenario_uuid}/generate-copy:
    post:
      tags: [Scenarios]
      summary: Generate new scenario from stored creation parameters
      description: >
        Replays `creation_parameters` from the source scenario through the same LLM generation
        path as `POST /v1/scenarios/generate`. Response shape matches generate (`uuid`, `job_uuid`,
        optional batch fields). Returns **400** when the source has no saved creation snapshot.
        Tenant scope is injected from the API key (query on upstream).
      operationId: generateScenarioCopy
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/ScenarioUuid"
      responses:
        "201":
          description: New scenario with scenario_creation job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCreateResponse"
              example:
                uuid: 00000000-0000-0000-0000-000000000002
                name: Product Return Flow (Copy)
                job_uuid: 11111111-1111-1111-1111-111111111111
        "400":
          description: Source has no creation_parameters to replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Scenario not in tenant scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Scenario not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Name conflict in workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/scenarios/{scenario_uuid}/copy:
    post:
      tags: [Scenarios]
      summary: Copy scenario
      description: >
        Duplicates storage (`scenario.json` when present) into a new scenario row in the same
        workspace. Optional `new_name` query parameter; default name is `{original} (Copy)` with
        numeric suffixes when needed.
      operationId: copyScenario
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/ScenarioUuid"
        - $ref: "#/components/parameters/NewName"
      responses:
        "201":
          description: Copied scenario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Scenario not in tenant scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Scenario not found, or source scenario.json missing in storage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Name conflict in workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/scenarios/{scenario_uuid}/job:
    get:
      tags: [Scenarios]
      summary: List jobs for scenario
      description: >
        Returns all non-deleted jobs for the scenario (newest first), including
        `scenario_creation` and other job types.
      operationId: getScenarioJob
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/ScenarioUuid"
      responses:
        "200":
          description: Scenario jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobsListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Scenario not in the authenticated workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Scenario not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/scenarios/{scenario_uuid}/artifacts:
    get:
      tags: [Scenarios]
      summary: Get scenario artifacts JSON
      description: >
        Downloads `scenario.json` (or legacy `benchmark.json` for corpus-linked rows) from storage.
        **404** when `definition_bucket_path` is unset or the file is missing.
      operationId: getScenarioArtifacts
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/ScenarioUuid"
      responses:
        "200":
          description: Parsed scenario.json (or legacy benchmark.json) object
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Scenario not in the authenticated workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: definition_bucket_path unset or JSON file missing in storage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"
    patch:
      tags: [Scenarios]
      summary: Replace scenario artifacts JSON
      description: >
        Replaces the entire `scenario.json` object in storage with the request body (full
        document upload, not a deep merge). Requires `definition_bucket_path` on the scenario.

        **Developer-only:** requires the API-key owner's Auth0 user to have the platform
        `developer` role (enforced by the gateway via Auth0 Management API).
      operationId: patchScenarioArtifacts
      x-developer-only: true
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/ScenarioUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
            example:
              prompt_template: "You are a support assistant. Follow policy strictly."
              metadata:
                owner: qa-team
                version: "1.0.0"
      responses:
        "200":
          description: Echoes the uploaded JSON document after writing to storage
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: API-key owner lacks Auth0 developer role, or scenario not in workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: definition_bucket_path unset on the scenario
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/jobs:
    get:
      tags: [Jobs]
      summary: List jobs
      description: >
        Lists async jobs for the workspace (scenario creation, engine simulation runs,
        evaluations, etc.) with optional `current_status` filter and pagination.
      operationId: listJobs
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - $ref: "#/components/parameters/CurrentStatus"
      responses:
        "200":
          description: List jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobResponse"
              example:
                - uuid: 11111111-1111-1111-1111-111111111111
                  job_type: simulation
                  user_uuid: 00000000-0000-0000-0000-000000000001
                  workspace_uuid: 00000000-0000-0000-0000-000000000002
                  current_status: PROCESSING
                  current_progress_text: Round 3 of 5
                  progress_percentage: 60
                  error_details: null
                  task_id: celery-task-id
                  created_at: "2026-04-30T10:00:00.000Z"
                  updated_at: "2026-04-30T10:02:30.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/jobs/{job_uuid}:
    get:
      tags: [Jobs]
      summary: Get job by UUID
      description: Returns one job by UUID — current status, progress, and error details.
      operationId: getJob
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/JobUuid"
      responses:
        "200":
          $ref: "#/components/responses/ProxySuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"
    delete:
      tags: [Jobs]
      summary: Delete job by UUID
      description: Deletes a job record. Typically allowed only for terminal states (`COMPLETED`, `FAILED`, `CANCELLED`).
      operationId: deleteJob
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/JobUuid"
      responses:
        "200":
          $ref: "#/components/responses/ProxySuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
