        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      tags: [Simulations]
      summary: Delete simulation
      description: Permanently removes a simulation record when allowed by policy.
      operationId: deleteSimulation
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/SimulationUuid"
      responses:
        "204":
          description: Simulation deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/simulations/{simulation_uuid}/cancel:
    post:
      tags: [Simulations]
      summary: Cancel simulation
      description: Cancels a still-active simulation and returns a cancellation result envelope.
      operationId: cancelSimulation
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/SimulationUuid"
      responses:
        "200":
          description: Cancellation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/simulations/{simulation_uuid}/files:
    get:
      tags: [Simulations]
      summary: Download run artifact file
      description: >
        Downloads a binary artifact persisted for a simulation run (transcripts, evidence files, evaluation artifacts). The `path` query parameter is relative to the run directory and must start with `files/` (for example `files/messages/round_1/1_report.pdf`). Tenant scope is derived from your API key, so `organization_uuid`/`workspace_uuid` are not supplied.
      operationId: downloadSimulationFile
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/SimulationUuid"
        - name: path
          in: query
          required: true
          description: Relative path under the run directory; must start with `files/`.
          schema:
            type: string
      responses:
        "200":
          description: File contents
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid path (missing, traversal, or not under `files/`).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Simulation or scenario does not belong to the authenticated workspace.
        "404":
          description: Simulation, scenario, or file not found.
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/simulations/{simulation_uuid}/output:
    get:
      tags: [Simulations]
      summary: Get simulation structured output JSON
      description: >
        Returns the stored simulation output document (`response.json` / ScenarioOutput) for
        a completed run. Tenant scope is derived from your API key — do not send
        `organization_uuid` or `workspace_uuid` query parameters on the public surface.
      operationId: getSimulationOutput
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/SimulationUuid"
      responses:
        "200":
          description: Parsed simulation output JSON
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Simulation or scenario does not belong to the authenticated workspace.
        "404":
          description: Simulation, scenario, or output file not found.
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/logs:
    get:
      tags: [Audit Logs]
      summary: List audit logs
      description: Lists organization audit log entries with optional date range, actor, and action filters.
      operationId: listAuditLogs
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Start timestamp (inclusive). Must be provided with `to`.
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: End timestamp (inclusive). Must be provided with `from`.
        - name: actor
          in: query
          required: false
          schema:
            type: string
          description: Actor identifier (user UUID or API key prefix).
        - name: action
          in: query
          required: false
          schema:
            type: string
          description: Action filter.
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicAuditLogsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/usage/events:
    get:
      tags: [Usage]
      summary: List usage events
      description: Lists usage telemetry events (LiteLLM/compute USD actuals) with filters for product area, related resource IDs, and pagination.
      operationId: listUsageEvents
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/ProductArea"
        - $ref: "#/components/parameters/Failed"
        - $ref: "#/components/parameters/EventStartFrom"
        - $ref: "#/components/parameters/EventStartTo"
        - $ref: "#/components/parameters/SimulationUuidQueryOptional"
        - $ref: "#/components/parameters/JobUuidQueryOptional"
        - $ref: "#/components/parameters/ScenarioUuidQueryOptional"
        - $ref: "#/components/parameters/SimulationJobUuid"
        - $ref: "#/components/parameters/EvaluationJobUuid"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Usage events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UsageEventResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/usage/events/{event_id}:
    get:
      tags: [Usage]
      summary: Get usage event
      description: Fetches one usage event by its identifier for drill-down or reconciliation.
      operationId: getUsageEvent
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - name: event_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Usage event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageEventResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/usage/calls:
    get:
      tags: [Usage]
      summary: List usage calls
      description: Lists model or provider call rows (token usage, latency) scoped by event or model filters.
      operationId: listUsageCalls
      parameters:
        - $ref: "#/components/parameters/XRequestId"
        - $ref: "#/components/parameters/EventUuid"
        - $ref: "#/components/parameters/ProviderName"
        - $ref: "#/components/parameters/ModelName"
        - $ref: "#/components/parameters/CallStartFrom"
        - $ref: "#/components/parameters/CallStartTo"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Usage calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UsageCallResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/validation/validate:
    post:
      tags: [Scenarios]
      summary: Validate JSON payload against scenario schema
      description: >
        Validates a JSON **string** against the scenario input model (`schema: scenario`, default).
        Always returns **200** with a human-readable `result` field (`VALID` / `INVALID` and error
        lines); malformed JSON or schema violations are expressed in `result`, not via 4xx.
      operationId: validateJsonPayload
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateRequest"
            example:
              json: '{"name":"sample","enabled":true}'
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/validation/schema/scenario:
    get:
      tags: [Scenarios]
      summary: Get scenario JSON schema
      description: Returns the canonical scenario JSON Schema document for client-side or offline validation.
      operationId: getValidationSchemaScenario
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      responses:
        "200":
          $ref: "#/components/responses/ProxySuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/client-tags/register-qna:
    post:
      tags: [Client Tags]
      summary: Register QnA client skill tag
      description: >
        Registers a per-organization QnA skill tag and persists the benchmark payload to
        master-data storage (`tags/org/<orgId>/qna/...` and `client_tags.jsonl`). Used by
        Q&amp;A Studio export and custom benchmark pipelines. Tenant UUIDs are injected from
        the API key. Set `dry_run: true` to validate without writing storage.
      operationId: registerClientQnaTag
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterClientQnaRequest"
            example:
              skill_tag: latin_dance_qna
              description: Latin dance history recall questions extracted from studio QnA.
              testing_method: Ask factual recall questions from the registered QnA benchmark.
              qna:
                questions:
                  - question: What is salsa?
                    correct_answer: A partner dance with Afro-Cuban roots.
                    is_hallucination_trap: false
              dry_run: false
      responses:
        "200":
          description: Tag registered or dry-run preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterClientQnaResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Skill tag name collides with a global catalogue tag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "422":
          description: Validation error (payload, tag name, or QnA content)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

  /v1/tags:
    get:
      tags: [Skill Tags]
      summary: List skill tags
      description: >
        Returns the scenario skill tag catalogue used by scenario generation, as a bare JSON array. The organization is derived from your API key, so the response is the global catalogue merged with your organization's custom tag overlay. Custom (org-scoped) tags are flagged with `custom: true`; global tags carry `custom: false`.

        Before `POST /v1/scenarios/generate`, filter for tags whose `allowed_scenario_types` includes your `scenario_type`. Tag existence and compatibility are validated asynchronously by the `scenario_creation` worker, so invalid tags yield **201** then a **FAILED** job, not a synchronous **400**.
      operationId: listSkillTags
      parameters:
        - $ref: "#/components/parameters/XRequestId"
      responses:
        "200":
          description: Tag catalogue (global merged with the API key organization's custom overlay)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SkillTag"
              example:
                - name: empathy
                  category: social
                  description: Recognize and respond to emotional cues.
                  benchmark_family: null
                  allowed_scenario_types: [info_exchange, interview]
                  custom: false
                - name: fraud-detection
                  category: safety
                  description: Org-defined fraud probe.
                  benchmark_family: null
                  allowed_scenario_types: [info_exchange]
                  custom: true
        "400":
          description: API key context is missing an organization
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string
                  statusCode:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/GatewayError"

components:
  securitySchemes:
    BearerApiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: "Send `Authorization: Bearer <api_key>`."

  parameters:
    XRequestId:
      name: X-Request-ID
      in: header
      required: false
      schema:
        type: string
      description: Optional trace identifier forwarded to upstream.
    Limit:
      name: limit
      in: query
      description: Maximum number of records to return (pagination page size).
      schema:
        type: integer
        minimum: 1
      example: 20
    Offset:
      name: offset
      in: query
      description: Number of records to skip from the beginning of the sorted result set.
      schema:
        type: integer
        minimum: 0
      example: 0
    AgentUuidQueryOptional:
      name: agent_uuid
      in: query
      required: false
      description: Restrict verification runs or lists to this registered workspace agent UUID.
      schema:
        type: string
        format: uuid
    SimulationUuidQueryOptional:
      name: simulation_uuid
      in: query
      required: false
      description: Filter usage events linked to a specific verification run.
      schema:
        type: string
        format: uuid
    JobUuidQueryOptional:
      name: job_uuid
      in: query
      required: false
      description: Filter usage events to those emitted for this async job UUID.
      schema:
        type: string
        format: uuid
    ScenarioUuidQueryOptional:
      name: scenario_uuid
      in: query
      required: false
      description: Filter usage events or other lists to this scenario UUID.
      schema:
        type: string
        format: uuid
    CreatedAfter:
      name: created_after
      in: query
      description: Return corpora created at or after this instant (RFC 3339 date-time).
      schema:
        type: string
        format: date-time
    CreatedBefore:
      name: created_before
      in: query
      description: Return corpora created at or before this instant (RFC 3339 date-time).
      schema:
        type: string
        format: date-time
    Tags:
      name: tags
      in: query
      required: false
      description: Match corpora having any of these tag strings (OR semantics; repeated query params).
      schema:
        type: array
        items:
          type: string
      style: form
      explode: true
    ScenarioType:
      name: scenario_type
      in: query
      description: Filter by scenario type (`info_exchange` or `interview`).
      schema:
        type: string
        enum: [info_exchange, interview]
    Status:
      name: status
      in: query
      description: >
        Repeatable filter on scenario row `status`. Values: `INIT`, `PROCESSING`, `SUCCESS`,
        `FAILED`, `CANCELLED`. `SUCCESS` means the scenario is materialised and runnable
        (`definition_bucket_path` set and scenario JSON uploaded). Use `scenario_creation_job_status`
        on list/get responses to track in-flight generation jobs.
      schema:
        type: array
        items:
          type: string
          enum: [INIT, PROCESSING, SUCCESS, FAILED, CANCELLED]
      style: form
      explode: true
    CurrentStatus:
      name: current_status
      in: query
      description: >
        Filter jobs whose `current_status` equals this value (exact string match). Values:
        `PENDING`, `PROCESSING`, `COMPLETED`, `FAILED`, `CANCELLED`.
      schema:
        type: string
        enum: [PENDING, PROCESSING, COMPLETED, FAILED, CANCELLED]
    AgentType:
      name: agent_type
      in: query
      description: Filter by connector type (`A2A`, `API`, `DIRECTLINE`, `EXTENSION`, `MCP`).
      schema:
        type: string
        enum: [A2A, API, DIRECTLINE, EXTENSION, MCP]
    NewName:
      name: new_name
      in: query
      description: Optional new display name when copying a scenario in-place.
      schema:
        type: string
    NumRuns:
      name: num_runs
      in: query
      required: true
      description: >
        Defined for forward compatibility; not referenced by current gateway paths. If wired
        by a proxy extension, expresses a run-count hint as an integer 1–10.
      schema:
        type: integer
        minimum: 1
        maximum: 10
    SimulationStatus:
      name: status
      in: query
      description: >
        Filter verification runs whose `status` equals this value. Values: `CREATED`,
        `IN_PROGRESS`, `COMPLETED`, `FAILED`, `CANCELLED`.
      schema:
        type: string
        enum: [CREATED, IN_PROGRESS, COMPLETED, FAILED, CANCELLED]
    RunGroupUuid:
      name: run_group_uuid
      in: query
      description: Return runs that belong to this batched / multi-scenario run group UUID.
      schema:
        type: string
        format: uuid
    DateFrom:
      name: date_from
      in: query
      description: Lower bound on run `created_at` or comparable timestamp (inclusive).
      schema:
        type: string
        format: date-time
    DateTo:
      name: date_to
      in: query
      description: Upper bound on run `created_at` or comparable timestamp (inclusive).
      schema:
        type: string
        format: date-time
    Search:
      name: search
      in: query
      description: Free-text filter applied to run metadata or identifiers (upstream-defined).
      schema:
        type: string
    HasSingleEvaluation:
      name: has_single_evaluation
      in: query
      description: When true, restrict to runs that have exactly one linked evaluation job.
      schema:
        type: boolean
    GroupByRunGroup:
      name: group_by_run_group
      in: query
      description: When true, collapse list results to one row per `run_group_uuid` (upstream semantics).
      schema:
        type: boolean
    IncludeEvaluationJobs:
      name: include_evaluation_jobs
      in: query
      description: When true, embed evaluation job summaries on each listed run (heavier payload).
      schema:
        type: boolean
    ItemIdentifier:
      name: item_identifier
      in: query
      description: Optional opaque item key when downloading evaluation payloads (upstream-specific).
      schema:
        type: string
    ProductArea:
      name: product_area
      in: query
      description: Filter usage events by billing product area code (ENGINE, SCENARIO_CREATION, etc.).
      schema:
        type: string
    Failed:
      name: failed
      in: query
      description: When set, return only failed (`true`) or only successful (`false`) usage events.
      schema:
        type: boolean
    EventStartFrom:
      name: event_start_from
      in: query
      description: Lower bound on usage event start timestamp (inclusive).
      schema:
        type: string
        format: date-time
    EventStartTo:
      name: event_start_to
      in: query
      description: Upper bound on usage event start timestamp (exclusive — events with `event_start_timestamp` equal to this value are excluded).
      schema:
        type: string
        format: date-time
    SimulationJobUuid:
      name: simulation_job_uuid
      in: query
      description: Filter usage events tied to this scenario-creation or simulation job identifier string.
      schema:
        type: string
    EvaluationJobUuid:
      name: evaluation_job_uuid
      in: query
      description: Filter usage events associated with this evaluation job UUID.
      schema:
        type: string
        format: uuid
    EventUuid:
      name: event_uuid
      in: query
      description: When listing usage calls, restrict to rows for this parent usage event UUID.
      schema:
        type: string
        format: uuid
    ProviderName:
      name: provider_name
      in: query
      description: Filter usage calls by LLM provider name (e.g. OpenAI, Anthropic).
      schema:
        type: string
    ModelName:
      name: model_name
      in: query
      description: Filter usage calls by model id or display name string.
      schema:
        type: string
    CallStartFrom:
      name: call_start_from
      in: query
      description: Lower bound on per-call start timestamp when listing usage calls (inclusive).
      schema:
        type: string
        format: date-time
    CallStartTo:
      name: call_start_to
      in: query
      description: Upper bound on per-call start timestamp when listing usage calls (exclusive — calls with `call_start_timestamp` equal to this value are excluded).
      schema:
        type: string
        format: date-time
    ScenarioUuid:
      name: scenario_uuid
      in: path
      required: true
      description: >
        UUID of a scenario in the authenticated workspace. Use the `uuid` field
        from scenario create, generate, list, or get responses (not a response field named
        `scenario_uuid`).
      schema:
        type: string
        format: uuid
    JobUuid:
      name: job_uuid
      in: path
      required: true
      description: UUID of an async job (creation, engine, evaluation, etc.) in the workspace.
      schema:
        type: string
        format: uuid
    AgentUuid:
      name: agent_uuid
      in: path
      required: true
      description: UUID of a registered workspace agent.
      schema:
        type: string
        format: uuid
    SimulationUuid:
      name: simulation_uuid
      in: path
      required: true
      description: >
        Identifier of a **verification run**. Use the `simulation_uuid` returned when starting
        a run or listed under `GET /v1/simulations`.
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: >
        **401** — API key missing, malformed `Authorization` header, or key not recognised.
        Response body uses `ErrorMessage` when JSON is returned.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorMessage"
    GatewayError:
      description: >
        **5xx / proxy error** — the gateway could not obtain a successful response from
        verifyax-api, or an internal gateway fault occurred. See `detail` in `GatewayError`.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GatewayError"
    TooManyRequests:
      description: >
        **429** — workspace rate limit exceeded. Honor `Retry-After` (seconds) before retrying.
        All public responses include `RateLimit-Limit`, `RateLimit-Remaining`, and `RateLimit-Reset`.
      content:
        application/json:
          schema:
            type: object
            required: [error, message, statusCode]
            properties:
              error:
                type: string
                example: Too Many Requests
              message:
                type: string
              statusCode:
                type: integer
                example: 429
    ProxySuccess:
      description: Upstream verifyax-api JSON response proxied unchanged by the gateway.
      content:
        application/json:
          schema:
            type: object
            description: Arbitrary JSON object returned by verifyax-api for this operation.
            additionalProperties: true

  schemas:
    ErrorMessage:
      type: object
      description: Generic JSON error envelope from the gateway or upstream when `message` is used.
      properties:
        message:
          type: string
          description: Human-readable error summary suitable for display or logs.
      additionalProperties: true

    GatewayError:
      type: object
      description: Gateway-side failure when the proxy cannot complete a request to verifyax-api.
      properties:
        detail:
          type: string
          description: Error detail string (may include upstream status or diagnostic text).
      required: [detail]

    ScenarioDefinitionMissingError:
      type: object
      description: >
        Structured 409 returned by `/v1/engine/simulate/scenario` and
        `/v1/engine/workspace-credit-preview` when the scenario row exists but its
        `scenario.json` artifact has not been uploaded yet. The frontend should key off
        `detail.error == "scenario_definition_missing"` to gate run-start affordances.
      properties:
        detail:
          type: object
          required: [error, message, scenario_uuid]
          properties:
            error:
              type: string
              enum: [scenario_definition_missing]
              description: Stable machine-readable error code.
            message:
              type: string
              description: Human-readable hint suggesting POST /v1/scenarios/generate.
            scenario_uuid:
              type: string
              format: uuid
              description: The scenario whose definition is missing.
            scenario_path:
              type: string
              description: Storage path the engine probed (debug aid; subject to change).
      required: [detail]

    OneTimeLoginTokenResponse:
      type: object
      description: One-time browser login hand-off; token must be redeemed quickly and never logged verbatim.
      properties:
        one-time-login-token:
          type: string
          description: Opaque single-use token string; pass only in URL fragment per `example_links`.
        example_links:
          type: object
          description: Example user-webapp URLs with the token in the fragment (after `#`).
          properties:
            home:
              type: string
              format: uri
              description: Example deep link to the app home route carrying the token fragment.
            workbench:
              type: string
              format: uri
              description: Example deep link to the workbench route carrying the token fragment.

    TicketCreate:
      type: object
      description: Body for `POST /v1/tickets`. The user id and email are derived from the API key, not the body.
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          description: Ticket body text (non-empty).
        type:
          type: string
          enum: [feedback, help_support]
          default: help_support
          description: Ticket category. Defaults to `help_support` when omitted.

    TicketResponse:
      type: object
      description: Envelope returned after a ticket is created.
      properties:
        success:
          type: boolean
          description: True when the ticket was stored.
        message:
          type: string
          description: Human-readable status message.
        data:
          $ref: "#/components/schemas/Ticket"

    Ticket:
      type: object
      description: A stored ticket (backed by a user message row).
      properties:
        id:
          type: string
          format: uuid
          description: Ticket identifier.
        userId:
          type: string
          format: uuid
          description: Id of the user who opened the ticket.
        type:
          type: string
          enum: [feedback, help_support]
          description: Ticket category.
        email:
          type: string
          format: email
          description: Email associated with the user when the ticket was opened.
        message:
          type: string
          description: Ticket body text.
        replied:
          type: boolean
          description: Whether the ticket has been marked as handled.
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp.

    ScenarioCreateRequest:
      type: object
      description: >
        Body for `POST /v1/scenarios` (synchronous shell). `scenario_type` is optional
        (`info_exchange` or `interview`); omit for empty shells before `PATCH .../artifacts`.
        `corpus_uuid`
        and other legacy L1 game fields return **400**. Response `job_uuid` is null. Developer-only.
      required: [name]
      properties:
        name:
          type: string
          description: Display name (unique per workspace after normalisation upstream).
        description:
          type: string
        scenario_type:
          type: string
          enum: [info_exchange, interview]
          description: Dialogue kind stored on the row when known at create time.
        tags:
          type: array
          items:
            type: string
          description: Optional workspace tags stored on the scenario row.
        creation_parameters:
          type: object
          additionalProperties: true
          description: Optional opaque creation metadata persisted on the scenario row.

    GenerateScenarioFromQnaRequest:
      type: object
      required: [name, questions]
      description: >
        Body for `POST /v1/scenarios/generate-from-qna`. Tenant UUIDs are injected by the
        gateway from the API key.
      properties:
        name:
          type: string
          description: Scenario record name.
        description:
          type: string
          nullable: true
          description: Optional scenario description.
        context_prompt:
          type: string
          nullable: true
          description: Optional NPC/interview setting.
        questions:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/QnaQuestionItem"

    QnaQuestionItem:
      type: object
      required: [question, correct_answer]
      properties:
        question:
          type: string
        correct_answer:
          type: string
        is_hallucination_trap:
          type: boolean
          default: false

    JobCancelResponse:
      type: object
      properties:
        message:
          type: string
          description: Human-readable cancellation acknowledgement.

    SimulationScenarioCreateRequest:
      type: object
      description: >
        Body for POST /v1/scenarios/generate (maps to verifyax-api SimulationScenarioCreate).
        The gateway injects organization_uuid, workspace_uuid, and user_uuid from the API key.
        Tag list size is capped at 5 for info_exchange and 2 for interview.

        **Discover tags:** `GET /v1/tags` (see Skill Tags). Pass each tag's `name` in
        `tags` / `tag_pool`. Filter by `allowed_scenario_types` for your `scenario_type` before
        calling generate — unknown or incompatible tags are rejected asynchronously by the
        `scenario_creation` worker (**201** then **FAILED** job, not **400** on POST).

        **Single vs batch:** Single mode sends name, scenario_type, tags, and optional
        context_prompt. Batch mode (num_scenarios > 1) adds tag_pool and optional include_tags,
        total_tags, and max_tags_per_npc. Internal engine, model, and DAG knobs are not part of
        the public contract; the gateway strips them before forwarding.
      required: [name, scenario_type]
      properties:
        name:
          type: string
          description: Scenario name (workspace-unique after normalisation).
        scenario_type:
          type: string
          enum: [info_exchange, interview]
          default: info_exchange
          description: Multi-agent `info_exchange` (default) or 1-to-1 `interview`. Controls tag caps and NPC layout.
        context_prompt:
          type: string
          description: Optional context to guide generation (info_exchange and interview).
        tags:
          type: array
          items:
            type: string
          description: >-
            Explicit skill tag `name` values from GET /v1/tags. At most 5
            (info_exchange) or 2 (interview). Each tag's `allowed_scenario_types` must include
            your `scenario_type`. Invalid tags fail on the async job, not synchronously.
        num_scenarios:
          type: integer
          minimum: 1
          maximum: 50
          default: 1
          description: >-
            Batch size. 1 = single scenario. Greater than 1 requires tag_pool and returns
            uuid, batch_uuid, and batch_scenario_uuids on the response.
        tag_pool:
          type: array
          items:
            type: string
          description: >-
            Required when num_scenarios > 1; universe of tag `name` values to sample from.
            Each entry must allow your `scenario_type` per the tag catalogue.
        include_tags:
          type: array
          items:
            type: string
          description: >-
            Batch only; tags required in every scenario. Must be a subset of tag_pool.
            total_tags must be at least the number of distinct include_tags.
        total_tags:
          type: integer
          minimum: 1
          maximum: 5
          description: >-
            Batch only; tags drawn per scenario from tag_pool (default len(tag_pool)).
            Capped at 5 info_exchange / 2 interview.
        max_tags_per_npc:
          type: integer
          minimum: 1
          description: >-
            Batch only; caps tags per NPC. NPC count = ceil(total_tags / max_tags_per_npc).
            Ignored for interview (single NPC). Worker default 1 when omitted.

    ScenarioUpdateRequest:
      type: object
      description: >
        Partial update for scenario display metadata. Only `name` and `description` are
        writable via PATCH; skill tags live in `scenario.json` and row `tags` / `valid_versions`
        are set by generation or copy, not this endpoint.
      properties:
        name:
          type: string
          description: New display name (workspace uniqueness enforced upstream).
        description:
          type: string
          description: New scenario description text.

    DirectlineAgentParameters:
      type: object
      description: >
        Direct Line 3.0 configuration for Microsoft Copilot Studio agents. Nested under
        `agent_parameters.directline` on `POST /v1/agents` when `agent_type` is `DIRECTLINE`.
        Set `agent_url` to the regional Direct Line host derived from `region`.
      required: [secret, region]
      properties:
        secret:
          type: string
          minLength: 1
          description: >
            Direct Line secret from Copilot Studio → Channels → Direct Line. Stored on the
            agent row and used at simulation runtime — never send in the flat test endpoint body
            after registration.
        region:
          type: string
          default: global
          enum: [global, europe, india, unitedstates, asia, australia, northamerica]
          description: >
            Direct Line deployment region. Maps to `agent_url`: `global` →
            `https://directline.botframework.com`; other regions →
            `https://{region}.directline.botframework.com` (for example `europe` →
            `https://europe.directline.botframework.com`).
        base_url:
          type: string
          format: uri
          nullable: true
          description: Optional override when the regional host differs from the default mapping.

    AgentCreateRequest:
      type: object
      description: >
        Registers a new agent endpoint in the workspace agent registry. For Copilot Studio,
        use `agent_type: DIRECTLINE` and nest credentials in `agent_parameters.directline`.
      required: [name]
      properties:
        name:
          type: string
          description: >-
            Display name for the registered agent. Must be unique within the workspace;
            if the requested name is taken, the server assigns the next available
            suffix (e.g. My Agent (1)).
        description:
          type: string
          description: Optional notes about the agent’s role or integration.
        agent_url:
          type: string
          format: uri
          description: >
            Endpoint URL VerifyAX calls. For A2A/API agents, your deployment URL. For
            `DIRECTLINE`, the regional Direct Line host (see `DirectlineAgentParameters.region`).
        agent_type:
          type: string
          enum: [A2A, API, DIRECTLINE, EXTENSION, MCP]
          default: A2A
          description: >
            Connector type. Use `DIRECTLINE` for Microsoft Copilot Studio over Bot Framework
            Direct Line 3.0. Defaults to `A2A`.
        agent_parameters:
          type: object
          additionalProperties: true
          description: >
            Connector-specific settings. For `DIRECTLINE`, include a `directline` object (see
            `DirectlineAgentParameters`). A2A/API agents use auth, timeout, and card keys
            documented in the Connect Agents guide.

    AgentUpdateRequest:
      type: object
      description: Partial update for an existing agent; only send fields that should change.
      properties:
        name:
          type: string
          description: >-
            New display name for the agent. Must be unique within the workspace;
            if the requested name is taken, the server assigns the next available
            suffix (e.g. My Agent (1)).
        description:
          type: string
          description: Updated agent description text.
        agent_url:
          type: string
          format: uri
          description: Updated endpoint URL when the deployment location changes.
        agent_type:
          type: string
          enum: [A2A, API, DIRECTLINE, EXTENSION, MCP]
          description: Switch connector type when migrating how VerifyAX talks to the agent.
        agent_parameters:
          type: object
          additionalProperties: true
          description: >
            Merged or replaced connector settings (upstream merge rules apply). For Direct Line,
            update `directline.secret` or `directline.region` here.

    AgentResponse:
      type: object
      description: Registered agent row returned from create/get/list endpoints.
      properties:
        uuid:
          type: string
          format: uuid
          description: Agent registry UUID.
        name:
          type: string
          description: Display name.
        description:
          type: string
          nullable: true
          description: Optional notes stored with the agent.
        user_uuid:
          type: string
          format: uuid
          description: Creating user UUID (tenant context).
        workspace_uuid:
          type: string
          format: uuid
          description: Owning workspace UUID.
        agent_url:
          type: string
          format: uri
          nullable: true
          description: Endpoint URL used by the connector for runs.
        agent_type:
          type: string
          description: Connector type (`A2A`, `API`, `DIRECTLINE`, `EXTENSION`, or `MCP`).
        agent_parameters:
          type: object
          nullable: true
          additionalProperties: true
          description: >
            Connector-specific configuration blob. Direct Line agents store credentials under
            `directline`.
        created_at:
          type: string
          format: date-time
          description: Registration timestamp (RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: Last modification timestamp (RFC 3339).

    EngineInterrogateScenarioRequest:
      type: object
      description: >
        Provide **exactly one** of `scenario_uuid` or `scenario_uuids`
        (batch of up to 50). When batching, runs share a **run group** for correlation upstream.
        For a single scenario, set `scenario_uuid` to the `uuid` returned by create or generate.
      properties:
        scenario_uuid:
          type: string
          format: uuid
          description: >
            Single scenario to run against — the scenario row’s `uuid` from create or generate
            responses.
        scenario_uuids:
          type: array
          maxItems: 50
          items:
            type: string
            format: uuid
          description: >
            Ordered list of scenario UUIDs to run in one request. Mutually exclusive with
            `scenario_uuid`; must contain at least one UUID when used.
        agent_uuid:
          type: string
          format: uuid
          description: >
            Registered workspace agent to exercise. The gateway resolves URL, connector
            strategy, and auth from this agent before starting the simulation.
        evaluate_on_complete:
          type: boolean
          default: true
          description: When true, queue evaluation automatically after the run completes successfully.
        num_runs:
          type: integer
          minimum: 1
          maximum: 10
          default: 1
          description: Number of parallel runs for robustness. Defaults to 1.
        timeout_minutes:
          type: integer
          minimum: 1
          maximum: 240
          description: >-
            Optional wall-clock budget in minutes for this verification run. Overrides
            simulation_config.timeout_minutes in the scenario definition for billing and
            playground execution. Workbench UI presets 5–60 min.

    EngineEvaluateTriggerRequest:
      type: object
      description: >
        Queues a standalone evaluation for a finished verification run. Tenant UUIDs are
        injected by the gateway on POST like other engine bodies.
      required: [simulation_uuid]
      properties:
        simulation_uuid:
          type: string
          format: uuid
          description: Verification run to evaluate (`simulation_uuid` from the run record).

    ScenarioResponse:
      type: object
      description: Scenario record including generation and complexity metadata.
      properties:
        uuid:
          type: string
          format: uuid
          description: >
            Scenario identifier. Returned as `uuid` on create and generate responses;
            supply this value for the `scenario_uuid` path parameter on `/v1/scenarios/{scenario_uuid}/...`
            and as `scenario_uuid` in `POST /v1/engine/simulate/scenario` request bodies.
        name:
          type: string
          description: Display name in the workspace.
        description:
          type: string
          nullable: true
          description: Optional description shown in UI and APIs.
        user_uuid:
          type: string
          format: uuid
          description: Creating user UUID (tenant context).
        workspace_uuid:
          type: string
          format: uuid
          description: Owning workspace UUID.
        corpus_uuid:
          type: string
          format: uuid
          nullable: true
          description: Legacy link to a corpus for corpus-linked scenarios, if any.
        game_version:
          type: integer
          nullable: true
          description: Legacy game benchmark version field when applicable.
        status:
          type: string
          nullable: true
          description: Scenario lifecycle status (`INIT`, `PROCESSING`, `SUCCESS`, `FAILED`, `CANCELLED`).
          enum: [INIT, PROCESSING, SUCCESS, FAILED, CANCELLED]
        scenario_creation_job_status:
          type: string
          nullable: true
          description: >
            Latest `scenario_creation` job `current_status` while materialisation is in progress.
            Values: `PENDING`, `PROCESSING`, `COMPLETED`, `FAILED`, `CANCELLED`.
          enum: [PENDING, PROCESSING, COMPLETED, FAILED, CANCELLED]
        creation_parameters:
          type: object
          nullable: true
          additionalProperties: true
          description: Snapshot of scenario generation inputs used to create or regenerate this scenario.
        num_questions:
          type: integer
          nullable: true
          description: Legacy question count for benchmark-style scenarios.
        scenario_type:
          type: string
          nullable: true
          description: >
            Dialogue kind (`info_exchange` or `interview`). Also mirrored in
            `creation_parameters.scenario_type` for generated scenarios when set.
        valid_versions:
          type: array
          items: { type: integer }
          description: Scenario JSON schema versions accepted for runs against this scenario.
        tags:
          type: array
          items: { type: string }
          description: Workspace tags for organisation and filtering.
        definition_bucket_path:
          type: string
          nullable: true
          description: Storage root where `scenario.json` and artifacts live once materialised.
        complexity_score:
          type: number
          nullable: true
          description: Numeric difficulty score derived from historical runs when computed.
        complexity_label:
          type: string
          nullable: true
          description: Human-readable complexity band (e.g. easy, medium, hard) when set.
        complexity_updated_at:
          type: string
          format: date-time
          nullable: true
          description: When complexity labels were last recomputed.
        run_metadata:
          type: object
          nullable: true
          additionalProperties: true
          description: Opaque per-scenario statistics or UI hints from upstream.
        created_at:
          type: string
          format: date-time
          description: Creation timestamp (RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp (RFC 3339).

    ScenarioCreateResponse:
      allOf:
        - $ref: "#/components/schemas/ScenarioResponse"
        - type: object
          description: >
            Environment row plus async job linkage after create or generate. The scenario id is
            `uuid` (inherited from ScenarioResponse), not `scenario_uuid`. After
            `POST /v1/scenarios/generate` (and generate-copy), `creation_parameters` is null in the
            response even though inputs are stored server-side.
          properties:
            job_uuid:
              type: string
              format: uuid
              nullable: true
              description: scenario_creation job UUID to poll via GET /v1/jobs/{job_uuid}; null for empty shells.
            batch_uuid:
              type: string
              format: uuid
              nullable: true
              description: Present when num_scenarios > 1; shared Celery task id for the batch.
            batch_scenario_uuids:
              type: array
              items:
                type: string
                format: uuid
              nullable: true
              description: All scenario UUIDs in a batch create, same order as jobs.

    JobResponse:
      type: object
      description: Single async job row (Celery-backed work unit) in the workspace.
      properties:
        uuid:
          type: string
          format: uuid
          description: Job UUID for polling and cancel/retry/delete APIs.
        job_type:
          type: string
          description: >
            Job classifier (e.g. scenario_creation, ENGINE, evaluation, simulation).
        user_uuid:
          type: string
          format: uuid
          description: User that triggered or owns the job record.
        workspace_uuid:
          type: string
          format: uuid
          description: Workspace scope for the job.
        current_status:
          type: string
          description: >
            Job lifecycle status. Poll until `COMPLETED`, `FAILED`, or `CANCELLED`. Values:
            `PENDING`, `PROCESSING`, `COMPLETED`, `FAILED`, `CANCELLED`.
          enum: [PENDING, PROCESSING, COMPLETED, FAILED, CANCELLED]
        current_progress_text:
          type: string
          nullable: true
          description: Short human-readable progress line suitable for UI.
        progress_percentage:
          type: number
          description: Approximate completion fraction between 0 and 100.
        error_details:
          type: string
          nullable: true
          description: Error message or stack snippet when the job failed.
        task_id:
          type: string
          nullable: true
          description: Celery task id when the worker has claimed the job.
        created_at:
          type: string
          format: date-time
          description: When the job row was created (RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: Last status or progress update (RFC 3339).

    JobsListResponse:
      type: object
      description: Wrapper listing zero or more jobs (e.g. all jobs tied to one scenario).
      properties:
        jobs:
          type: array
          description: Ordered collection of job rows (typically newest-first from upstream).
          items:
            $ref: "#/components/schemas/JobResponse"

    EvaluationJobInfo:
      type: object
      description: Lightweight evaluation job summary embedded on verification run list rows.
      properties:
        uuid:
          type: string
          format: uuid
          description: Evaluation job UUID (use with evaluation download endpoints when complete).
        job_type:
          type: string
          description: Upstream evaluation job type discriminator.
        user_uuid:
          type: string
          format: uuid
          description: User associated with the evaluation job record.
        current_status:
          type: string
          description: >
            Evaluation job lifecycle status (`PENDING`, `PROCESSING`, `COMPLETED`, `FAILED`,
            `CANCELLED`).
          enum: [PENDING, PROCESSING, COMPLETED, FAILED, CANCELLED]
        current_progress_text:
          type: string
          nullable: true
          description: Short progress description for the evaluation worker.
        progress_percentage:
          type: number
          description: Approximate evaluation completion percentage.
        error_details:
          type: string
          nullable: true
          description: Populated when evaluation fails or is cancelled with a reason.
        created_at:
          type: string
          format: date-time
          description: When the evaluation job was enqueued (RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: Last evaluation status change (RFC 3339).

    SimulationListResponse:
      type: object
      description: >
        Summary of one **verification run**: counters, linkage to scenario
        and agent, evaluation flags, and optional nested evaluation jobs.
      properties:
        uuid:
          type: string
          format: uuid
          description: Verification run UUID (`simulation_uuid` in engine responses).
        user_uuid:
          type: string
          format: uuid
          description: User that owns or initiated the run.
        workspace_uuid:
          type: string
          format: uuid
          description: Workspace scope for the run.
        scenario_uuid:
          type: string
          format: uuid
          nullable: true
          description: >
            Linked scenario UUID on the run record (same value as the scenario row’s
            `uuid` field, not a separate response key on create/generate).
        agent_uuid:
          type: string
          format: uuid
          nullable: true
          description: Registered agent UUID under test when not using a pure override flow.
        agent_identifier:
          type: string
          nullable: true
          description: Stable agent key or catalogue identifier from upstream when set.
        agent_url:
          type: string
          nullable: true
          description: Effective agent URL used for this run (may reflect overrides).
        status:
          type: string
          description: >
            Run lifecycle status. Poll until `COMPLETED`, `FAILED`, or `CANCELLED`. Evaluation
            is a separate async job — not a run status value.
          enum: [CREATED, IN_PROGRESS, COMPLETED, FAILED, CANCELLED]
        total_items:
          type: integer
          description: Total work units or steps tracked for progress (engine-specific).
        completed_items:
          type: integer
          description: Work units successfully completed so far.
        failed_items:
          type: integer
          description: Work units that ended in a hard failure.
        started_at:
          type: string
          format: date-time
          nullable: true
          description: When execution began (RFC 3339).
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: When execution finished or was terminal (RFC 3339).
        execution_mode:
          type: string
          nullable: true
          description: Engine execution mode discriminator when present.
        simulation_type:
          type: string
          nullable: true
          description: Scenario vs game / benchmark type string from upstream.
        scenario_version:
          type: integer
          nullable: true
          description: Scenario JSON schema version used for this run when recorded.
        run_group_uuid:
          type: string
          format: uuid
          nullable: true
          description: Batched runs share one run group UUID for correlation.
        run_index:
          type: integer
          nullable: true
          description: Zero-based index within a multi-run or batch group when applicable.
        created_at:
          type: string
          format: date-time
          nullable: true
          description: Row creation time (RFC 3339).
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Last mutation time (RFC 3339).
        run_metadata:
          type: object
          nullable: true
          additionalProperties: true
          description: Opaque JSON bag with UI hints, cost hints, or engine diagnostics.
        evaluation_jobs:
          type: array
          description: Nested evaluation jobs spawned for this run (may be empty).
          items:
            $ref: "#/components/schemas/EvaluationJobInfo"
        has_single_evaluation:
          type: boolean
          nullable: true
          description: Denormalised flag — true when exactly one evaluation job exists.
        has_aggregated_evaluation:
          type: boolean
          nullable: true
          description: Denormalised flag — true when an aggregated evaluation result exists.

    SimulationDetailResponse:
      allOf:
        - $ref: "#/components/schemas/SimulationListResponse"
        - type: object
          description: Full verification run row including engine `run_parameters` payload.
          properties:
            run_parameters:
              type: object
              nullable: true
              additionalProperties: true
              description: Engine-supplied parameters snapshot (timeouts, overrides, flags, …).

    PaginatedSimulationListResponse:
      type: object
      description: Page of verification runs plus total count for infinite-scroll style UIs.
      properties:
        items:
          type: array
          description: Runs for the requested page (size `limit`, skip `offset`).
          items:
            $ref: "#/components/schemas/SimulationListResponse"
        total:
          type: integer
          description: Total matching runs across all pages for the current filter set.
        limit:
          type: integer
          description: Page size used for this response (echo of request `limit`).
        offset:
          type: integer
          description: Skip value used for this response (echo of request `offset`).

    GetEvaluationResponse:
      type: object
      description: Evaluation job envelope including structured scores when the job has finished.
      properties:
        uuid:
          type: string
          format: uuid
          description: Evaluation job UUID (same as path `evaluation_job_uuid` when fetched directly).
        simulation_uuid:
          type: string
          format: uuid
          description: Parent verification run UUID this evaluation scores.
        user_uuid:
          type: string
          format: uuid
          description: User that owns the evaluation job record.
        current_status:
          type: string
          description: Evaluation worker status string.
        current_progress_text:
          type: string
          nullable: true
          description: Short human-readable evaluation progress line.
        progress_percentage:
          type: number
          description: Approximate evaluation completion percentage.
        error_details:
          type: string
          nullable: true
          description: Failure detail when evaluation ends in error.
        created_at:
          type: string
          format: date-time
          description: When the evaluation job was created (RFC 3339).
        updated_at:
          type: string
          format: date-time
          description: Last evaluation status change (RFC 3339).
        evaluation:
          type: object
          nullable: true
          additionalProperties: true
          description: >
            Structured evaluation payload (scores, rationales, per-criterion breakdown) when
            `current_status` indicates success; null while pending or on hard failure.

    PublicSimulationEvaluationResponse:
      type: object
      description: Gateway evaluation response for a simulation UUID.
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/GetEvaluationResponse"
      required: [success]

    PublicSimulationScoreSummary:
      type: object
      description: Score summary derived from the latest evaluation payload for a simulation.
      properties:
        overall_score:
          type: number
          nullable: true
          description: Mean of per-tag average grades.
        per_tag_scores:
          type: object
          additionalProperties:
            type: number
          description: Map of tag name to average grade.
        evaluator_model:
          type: string
          nullable: true
          description: Evaluator model when available in payload metadata.
        timestamp:
          type: string
          format: date-time
          nullable: true
          description: Best available evaluation timestamp.
      required: [overall_score, per_tag_scores, evaluator_model, timestamp]

    PublicSimulationScoreResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            simulation_uuid:
              type: string
              format: uuid
            overall_score:
              type: number
              nullable: true
            per_tag_scores:
              type: object
              additionalProperties:
                type: number
            evaluator_model:
              type: string
              nullable: true
            timestamp:
              type: string
              format: date-time
              nullable: true
          required:
            - simulation_uuid
            - overall_score
            - per_tag_scores
            - evaluator_model
            - timestamp
      required: [success, data]

    PublicBatchSimulationScoresResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            scores:
              type: object
              additionalProperties:
                type: object
                allOf:
                  - $ref: "#/components/schemas/PublicSimulationScoreSummary"
                nullable: true
          required: [scores]
      required: [success, data]

    PublicBillingBalanceResponse:
      type: object
      description: Billing balance response for the authenticated organization.
      properties:
        credits_remaining:
          type: number
        credits_used:
          type: number
          nullable: true
        plan:
          type: string
          nullable: true
        billing_period_end:
          type: string
          format: date-time
          nullable: true
      required: [credits_remaining, credits_used, plan, billing_period_end]

    PublicAuditLogEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        traceId:
          type: string
        userId:
          type: string
          format: uuid
          nullable: true
        userName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        key:
          type: string
          nullable: true
        action:
          type: string
        route:
          type: string
        organizationId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        method:
          type: string
          nullable: true

    PublicAuditLogsPagination:
      type: object
      properties:
        page:
          type: integer
        offset:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      required: [page, offset, limit, total, totalPages]

    PublicAuditLogsResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/PublicAuditLogEntry"
        pagination:
          $ref: "#/components/schemas/PublicAuditLogsPagination"
      required: [success, data, pagination]

    CancelResponse:
      type: object
      description: Acknowledgement and side-effect summary when cancelling a run or related job.
      properties:
        message:
          type: string
          description: Human-readable outcome message from upstream.
        job_uuid:
          type: string
          format: uuid
          nullable: true
          description: Related orchestration job UUID that was signalled to stop, if any.
        simulation_uuid:
          type: string
          format: uuid
          nullable: true
          description: Verification run UUID that was targeted for cancellation.
        warnings:
          type: array
          items: { type: string }
          description: Non-fatal notices (e.g. already terminal, partial cleanup).

    StartSimulationResponse:
      type: object
      description: Acknowledgement from engine start endpoints — async work continues under `job_uuid`.
      properties:
        job_uuid:
          type: string
          format: uuid
          description: Orchestration job to poll via `GET /v1/jobs/{job_uuid}`.
        simulation_uuid:
          type: string
          format: uuid
          description: Primary verification run id (single-scenario start).
        evaluation_job_uuid:
          type: string
          format: uuid
          nullable: true
          description: Present when evaluation was scheduled immediately (`evaluate_on_complete`).
        status:
          type: string
          description: Engine acknowledgement status (e.g. `dispatched`).
          example: dispatched
        message:
          type: string
          description: Human-readable detail from the engine.
          example: Scenario simulation task(s) dispatched successfully (1 run(s))
        simulation_uuids:
          type: array
          items: { type: string, format: uuid }
          description: Populated for multi-scenario / multi-run responses instead of a single `simulation_uuid`.
        run_group_uuid:
          type: string
          format: uuid
          nullable: true
          description: Correlates batched or multi-run executions in the UI and APIs.

    CreditPreviewRequest:
      type: object
      description: >
        Workspace credit preview. The gateway injects `organization_uuid`, `workspace_uuid`,
        and `user_uuid` on proxied POST bodies, so clients may omit tenant fields entirely.
        Upstream validation: `scenario_run` requires `scenario_uuid` and `num_runs`;
        `scenario_generation` requires `num_scenarios`.
      required: [mode, organization_uuid, workspace_uuid]
      properties:
        mode:
          type: string
          enum: [scenario_run, scenario_generation]
          description: Select run-cost estimate vs scenario batch-generation estimate.
        organization_uuid:
          type: string
          format: uuid
          description: Organisation scope (overwritten from API key by the gateway).
        workspace_uuid:
          type: string
          format: uuid
          description: Workspace scope (overwritten from API key by the gateway).
        scenario_uuid:
          type: string
          format: uuid
          description: >
            Required when `mode` is `scenario_run` — target scenario (the scenario row’s
            `uuid` from create or generate, passed here as `scenario_uuid`).
        num_runs:
          type: integer
          minimum: 1
          maximum: 10
          description: Required when `mode` is `scenario_run` — number of planned runs to price.
        agent_uuid:
          type: string
          format: uuid
          nullable: true
          description: Optional agent hint for run-cost estimates (registry agent UUID).
        timeout_minutes:
          type: integer
          minimum: 1
          maximum: 240
          description: >-
            scenario_run: overrides simulation_config.timeout_minutes for the credit estimate.
            scenario_generation: generation time budget (mirrors scenario create). Omit for defaults.
        num_scenarios:
          type: integer
          minimum: 1
          maximum: 50
          description: Required when `mode` is `scenario_generation` — number of scenario creates to price.

    CreditPreviewRunItem:
      type: object
      description: One in-flight or pending ENGINE verification run contributing to committed credits.
      required: [simulationUuid, estimatedCredits]
      properties:
        simulationUuid:
          type: string
          format: uuid
          description: Verification run UUID with a stored credit estimate.
        estimatedCredits:
          type: number
          description: Credits reserved or estimated for that run.
        status:
          type: string
          nullable: true
          description: Run or job status when provided (`CREATED`, `IN_PROGRESS`, `COMPLETED`, `FAILED`, `CANCELLED`, or job `PENDING`, `PROCESSING`, …).

    CreditPreviewGenerationItem:
      type: object
      description: One pending scenario_creation job contributing to generation commitments.
      required: [jobUuid, estimatedCredits]
      properties:
        jobUuid:
          type: string
          format: uuid
          description: scenario_creation job UUID.
        estimatedCredits:
          type: number
          description: Credits estimated for that generation job.
        status:
          type: string
          nullable: true
          description: Job status when available (`PENDING`, `PROCESSING`, `COMPLETED`, `FAILED`, `CANCELLED`).

    CreditPreviewResponse:
      type: object
      description: >
        Workspace credit snapshot: current balance, pending commitments, existing in-flight
        work, and optional estimate for a **new** run or generation request.
      required:
        - balance
        - existingRuns
        - existingRunsEstimatedTotal
        - existingGenerations
        - pendingGenerationsEstimatedTotal
        - pendingCommittedTotal
      properties:
        balance:
          type: number
          description: Organisation credit balance visible to billing after recent updates.
        newRunEstimatedCredits:
          type: number
          nullable: true
          description: Set when `mode` was `scenario_run` — estimated incremental cost for the proposed run(s).
        newRunEstimateMetadata:
          type: object
          additionalProperties: true
          nullable: true
          description: >
            Full billing estimate metadata for the new run preview, including nested
            `estimate_breakdown` (NPC/evaluator/external/compute lines), `effective_rounds`,
            `scenario_type_used`, `global_config_version`, etc.
        newGenerationEstimatedCredits:
          type: number
          nullable: true
          description: Set when `mode` was `scenario_generation` — estimated cost for N new scenarios.
        existingRuns:
          type: array
          description: Pending ENGINE runs with stored per-run estimates.
          items:
            $ref: "#/components/schemas/CreditPreviewRunItem"
        existingRunsEstimatedTotal:
          type: number
          description: Sum of `estimatedCredits` across `existingRuns`.
        existingGenerations:
          type: array
          description: Pending scenario_creation jobs with stored estimates.
          items:
            $ref: "#/components/schemas/CreditPreviewGenerationItem"
        pendingGenerationsEstimatedTotal:
          type: number
          description: Sum of generation estimates for jobs in `existingGenerations`.
        pendingCommittedTotal:
          type: number
          description: >
            Credits already soft-committed by in-flight ENGINE runs and scenario_creation jobs
            (used with balance to compute headroom).

    TriggerEvaluationResponse:
      type: object
      description: Acknowledgement after manually triggering evaluation for a simulation run in `COMPLETED` status.
      properties:
        evaluation_job_uuid:
          type: string
          format: uuid
          description: UUID of the newly created evaluation job to poll or download.
        simulation_uuid:
          type: string
          format: uuid
          description: Verification run being evaluated.
        status:
          type: string
          description: Engine acknowledgement status for the trigger request.
        message:
          type: string
          description: Human-readable detail from the evaluation trigger path.

    FetchAgentCardRequest:
      type: object
      description: >
        Connectivity check: fetches an A2A agent card (or equivalent) through the gateway
        connector — useful before registering an agent URL.
      properties:
        agent_url:
          type: string
          nullable: true
          description: Absolute URL of the `.well-known` agent card or root to fetch.
        agent_type:
          type: string
          default: A2A
          description: Connector hint; defaults to A2A card discovery semantics.
        agent_parameters:
          type: object
          nullable: true
          additionalProperties: true
          description: Optional extra parameters passed to the connector (timeouts, headers, etc.).

    TestRestAgentRequest:
      type: object
      description: >
        Sends a single HTTP request to a REST-style agent through the gateway for debugging;
        not a full verification run.
      required: [url]
      properties:
        url:
          type: string
          description: Fully qualified URL to invoke (method applied as given).
        method:
          type: string
          default: GET
          description: HTTP verb (GET, POST, PUT, PATCH, DELETE, …).
        headers:
          type: object
          additionalProperties:
            type: string
          description: Outbound request headers (e.g. Authorization, Content-Type).
        body:
          type: object
          description: Optional JSON object body for non-GET calls; arbitrary keys are forwarded upstream.
          additionalProperties: true
        timeout:
          type: number
          default: 10.0
          description: Per-request timeout in seconds enforced server-side.

    TestCurlAgentRequest:
      type: object
      description: >
        Executes a curl-style command template server-side with sandboxed outbound access;
        intended for integration smoke tests, not arbitrary shell.
      required: [curl_command]
      properties:
        curl_command:
          type: string
          description: Full curl command line as a single string (quoting rules apply server-side).
        timeout:
          type: number
          default: 10.0
          description: Maximum seconds to wait for the proxied curl execution.

    A2AConnectionTestRequest:
      type: object
      description: >
        Body for `POST /v1/agents/tests/a2a-connection`. Tenant UUIDs and optional
        `agent_uuid` are injected or supplied from the API key context when testing a saved
        registry agent.
      required: [agent_url]
      properties:
        agent_url:
          type: string
          description: Absolute URL of the agent or agent-card entrypoint.
        agent_type:
          type: string
          default: A2A
        agent_parameters:
          type: object
          nullable: true
          additionalProperties: true
        agent_uuid:
          type: string
          format: uuid
          nullable: true
          description: When set with tenant context, mini-sim results are persisted on the agent.
        message:
          type: string
          nullable: true
          description: Optional probe message for the synchronous A2A message step.
        cs_auth_token:
          type: string
          nullable: true
          description: Fresh Conscium session token for `auth_method=cs` agents.

    TestA2AMessageRequest:
      type: object
      description: Body for `POST /v1/agents/tests/a2a-message`.
      properties:
        agent_url:
          type: string
          nullable: true
        agent_type:
          type: string
          default: A2A
        agent_parameters:
          type: object
          nullable: true
          additionalProperties: true
        message:
          type: string
          nullable: true
          description: Optional probe message for the A2A message test.

    TestDirectlineAgentRequest:
      type: object
      description: >
        Body for `POST /v1/agents/tests/api-agent-test-directline` (pre-registration probe).
        Uses top-level `secret` and `region` — not `agent_parameters.directline` on
        `POST /v1/agents`.
      required: [secret]
      properties:
        secret:
          type: string
          minLength: 1
          description: Direct Line secret from Copilot Studio.
        region:
          type: string
          default: global
          description: Direct Line region code or `global`.
        message:
          type: string
          default: Hello
          description: Probe message sent to the Copilot Studio agent.
        timeout:
          type: number
          default: 60.0
          description: Poll timeout in seconds.

    McpToolInfo:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          default: ""
        input_schema:
          type: object
          additionalProperties: true
          default: {}

    TestMcpConnectionRequest:
      type: object
      description: >
        Body for `POST /v1/agents/tests/mcp-connection`. Tenant UUIDs are injected from the
        API key. When `agent_uuid` is set, stored MCP credentials may be merged from the registry.
      required: [mcp_url]
      properties:
        mcp_url:
          type: string
          minLength: 1
          description: Target remote MCP server URL (must be a public HTTPS endpoint).
        auth_method:
          type: string
          default: bearer
          enum: [bearer, none]
          description: Authentication mode for the MCP server.
        token:
          type: string
          nullable: true
          description: Bearer token or PAT when auth_method is bearer.
        transport:
          type: string
          nullable: true
          enum: [streamable-http, sse, auto]
          description: MCP transport; auto-detect when omitted.
        agent_url:
          type: string
          format: uri
          nullable: true
          description: Catalogue MCP adapter A2A URL for card/message probes after discovery.
        agent_uuid:
          type: string
          format: uuid
          nullable: true
          description: Persisted registry agent UUID; loads redacted MCP credentials when set.
        agent_parameters:
          type: object
          nullable: true
          additionalProperties: true
          description: Registry agent parameters merged with request fields (includes nested `mcp`).
        message:
          type: string
          nullable: true
          description: Optional probe message for the adapter A2A message test.

    TestMcpConnectionResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
          nullable: true
        transport:
          type: string
          nullable: true
        server_info:
          type: object
          additionalProperties: true
        tools:
          type: array
          items:
            $ref: "#/components/schemas/McpToolInfo"
        auth_required:
          type: boolean
        auth_type:
          type: string
          nullable: true
        provider_hint:
          type: string
          nullable: true
        outcome:
          type: string
          nullable: true
          enum: [success, failure, partial, pending]
        connection:
          $ref: "#/components/schemas/ConnectionTestStepStatus"
        agent_card:
          $ref: "#/components/schemas/ConnectionTestStepStatus"
        agent_communication:
          $ref: "#/components/schemas/ConnectionTestStepStatus"
        testing_started:
          type: boolean
          default: false

    ConnectionTestStepStatus:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [success, failure, skipped, pending]
        message:
          type: string
        agent_card_url:
          type: string
          nullable: true

    A2AConnectionTestResponse:
      type: object
      required: [success, message, outcome, connection, agent_card, agent_communication]
      properties:
        success:
          type: boolean
          description: True when connection, card, and communication steps all pass.
        message:
          type: string
        outcome:
          type: string
          enum:
            - testing
            - unreachable
            - profile_not_found
            - wont_reply
            - save_and_retest
            - connected
            - connected_interview_only
            - connected_info_exchange_only
            - practice_run_failed
            - server_error
            - unexpected_error
        connection:
          $ref: "#/components/schemas/ConnectionTestStepStatus"
        agent_card:
          $ref: "#/components/schemas/ConnectionTestStepStatus"
        agent_communication:
          $ref: "#/components/schemas/ConnectionTestStepStatus"
        interview:
          type: object
          allOf:
            - $ref: "#/components/schemas/ConnectionTestStepStatus"
          nullable: true
        info_exchange:
          type: object
          allOf:
            - $ref: "#/components/schemas/ConnectionTestStepStatus"
          nullable: true
        testing_started:
          type: boolean
          default: false
          description: True when background mini-simulations were started.

    RegisterClientQnaRequest:
      type: object
      required: [skill_tag, description, qna]
      properties:
        skill_tag:
          type: string
          description: Canonical tag name (must not collide with a global catalogue tag).
        description:
          type: string
          minLength: 10
        testing_method:
          type: string
          minLength: 10
          default: Ask factual recall questions from the registered QnA benchmark.
        category:
          type: string
          default: qna_custom
        qna_file:
          type: string
          nullable: true
          description: Optional filename hint for stored QnA JSON.
        comments:
          type: string
          nullable: true
        qna:
          type: object
          required: [questions]
          properties:
            questions:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/QnaQuestionItem"
        qna_user_edited:
          type: boolean
          default: false
        dry_run:
          type: boolean
          default: false
          description: When true, validate only — no writes to master-data storage.

    RegisterClientQnaResponse:
      type: object
      required: [action, skill_tag, qna_storage_path, client_tags_storage_path, question_count]
      properties:
        action:
          type: string
          enum: [appended, updated, dry_run]
        skill_tag:
          type: string
        qna_storage_path:
          type: string
        client_tags_storage_path:
          type: string
        question_count:
          type: integer
        row:
          type: object
          nullable: true
          additionalProperties: true
          description: Client tag row written or previewed in `client_tags.jsonl`.

    UsageEventResponse:
      type: object
      description: >
        One **usage event** (billable execution telemetry row) from `/v1/usage/events`. Costs are
        LiteLLM USD actuals and optional compute; they are **not** customer billing credits
        (see `GET /v1/billing/balance` for credit balance). Additional fields may appear beyond
        those listed (`additionalProperties: true`).
      additionalProperties: true
      properties:
        uuid:
          type: string
          format: uuid
          description: Usage event UUID.
        organization_uuid:
          type: string
          format: uuid
          description: Organisation that incurred the spend.
        user_uuid:
          type: string
          format: uuid
          description: User attributed on the event (often the API key user).
        workspace_uuid:
          type: string
          format: uuid
          description: Workspace attributed on the event.
        session_id:
          type: string
          nullable: true
          description: >
            Correlation id for the billable session (for example `sim-{run_uuid}` or
            `eval-{run_uuid}`).
        event_start_timestamp:
          type: string
          format: date-time
          description: When the billable work started (RFC 3339).
        event_end_timestamp:
          type: string
          format: date-time
          nullable: true
          description: When the billable work finished (null while in progress).
        event_duration_seconds:
          type: number
          nullable: true
          description: Wall-clock duration from start to end in seconds.
        product_area:
          type: string
          description: High-level product or pipeline area code (ENGINE, SCENARIO_CREATION, …).
        compute_runtime_seconds:
          type: number
          nullable: true
          description: Compute runtime attributed to the event in seconds.
        compute_machine_class:
          type: string
          nullable: true
          description: Machine class used for compute cost attribution.
        memory_tier:
          type: string
          nullable: true
          description: Memory tier used for compute cost attribution.
        input_tokens:
          type: integer
          nullable: true
          description: Sum of input tokens across child usage calls.
        output_tokens:
          type: integer
          nullable: true
          description: Sum of output tokens across child usage calls.
        cached_tokens:
          type: integer
          nullable: true
          description: Sum of cached tokens across child usage calls.
        cache_read_input_tokens:
          type: integer
          nullable: true
          description: Sum of cache-read input tokens across child usage calls.
        cache_creation_input_tokens:
          type: integer
          nullable: true
          description: Sum of cache-creation input tokens across child usage calls.
        total_calls:
          type: integer
          nullable: true
          description: Number of child usage calls rolled up into this event.
        actual_total_llm_cost:
          type: number
          nullable: true
          description: >
            Sum of LiteLLM USD actual LLM cost across child calls (`actual_total_llm_cost`). Use
            this (or `actual_total_event_cost`) to aggregate platform spend — not billing
            credits.
        actual_input_token_cost:
          type: number
          nullable: true
          description: Sum of USD input-token cost across child calls.
        actual_output_token_cost:
          type: number
          nullable: true
          description: Sum of USD output-token cost across child calls.
        actual_compute_cost:
          type: number
          nullable: true
          description: USD compute cost attributed to the event.
        actual_total_event_cost:
          type: number
          nullable: true
          description: >
            Total USD event cost (LLM + compute). Preferred field when summing per-event platform
            spend across `/v1/usage/events`.
        event_metadata:
          type: object
          nullable: true
          additionalProperties: true
          description: >
            Product-specific metadata (for example `simulation_uuid`, `job_uuid`,
            `evaluation_job_uuid`, `estimated_credits` on some ENGINE runs). Billing debits are
            written separately to the ledger; they are not returned as a top-level `credits`
            field on this object.
        failed:
          type: boolean
          nullable: true
          description: Whether the underlying work ultimately failed (null until terminal).
        created_at:
          type: string
          format: date-time
          description: Event creation timestamp (RFC 3339).

    UsageCallResponse:
      type: object
      description: >
        One LLM **provider call** row from `/v1/usage/calls`; may include extra metering fields
        from upstream (`additionalProperties: true`).
      additionalProperties: true
      properties:
        uuid:
          type: string
          format: uuid
          description: Call row UUID.
        event_uuid:
          type: string
          format: uuid
          description: Parent usage event UUID this call rolled up into.
        request_id:
          type: string
          nullable: true
          description: LiteLLM request or call id for UI correlation.
        provider_name:
          type: string
          description: LLM vendor identifier string.
        model_name:
          type: string
          description: Model id or display name for this call.
        model_version:
          type: string
          nullable: true
          description: Provider-reported model version when available.
        input_tokens:
          type: integer
          description: Billable input tokens attributed to the call.
        output_tokens:
          type: integer
          description: Billable output tokens attributed to the call.
        cached_tokens:
          type: integer
          nullable: true
          description: Cached tokens attributed to the call.
        cache_read_input_tokens:
          type: integer
          nullable: true
          description: Cache-read input tokens attributed to the call.
        cache_creation_input_tokens:
          type: integer
          nullable: true
          description: Cache-creation input tokens attributed to the call.
        actual_total_llm_cost:
          type: number
          nullable: true
          description: LiteLLM USD actual total LLM cost for this call.
        actual_input_token_cost:
          type: number
          nullable: true
          description: USD input-token cost for this call.
        actual_output_token_cost:
          type: number
          nullable: true
          description: USD output-token cost for this call.
        tool_usage_units:
          type: number
          nullable: true
          description: Non-LLM tool usage quantity (for example Tavily search credits).
        tool_usage_unit_of_measure:
          type: string
          nullable: true
          description: Unit for `tool_usage_units` (for example `credit`, `second`).
        call_start_timestamp:
          type: string
          format: date-time
          description: When the provider call began (RFC 3339).
        call_end_timestamp:
          type: string
          format: date-time
          nullable: true
          description: When the provider call finished (RFC 3339).
        created_at:
          type: string
          format: date-time
          description: Row creation timestamp (RFC 3339).

    ValidateRequest:
      type: object
      description: >
        Validates a JSON **string** against a named in-product schema before you submit
        generation payloads.
      required: [json]
      properties:
        json:
          type: string
          description: JSON string to validate.
        schema:
          type: string
          enum: [scenario]
          default: scenario
          description: >
            Validator id. Use `scenario` (validates scenario input via Pydantic; same model as
            GET /v1/validation/schema/scenario).

    ValidateResponse:
      type: object
      description: Outcome of JSON schema validation against the selected validator (`scenario`, etc.).
      properties:
        result:
          type: string
          description: >
            Human-readable report starting with `Validation Status:` and either `VALID` or
            `INVALID` plus numbered errors when invalid.
        service:
          type: string
          description: Internal validator service name that processed the request.
        request_id:
          type: string
          description: Correlation id echoed from the validator for support tickets.
        processing_time:
          type: number
          description: Server-side validation duration in seconds (floating point).

    SkillTag:
      type: object
      description: >
        One scenario skill tag. Use `name` in scenario generation requests. Filter by
        `allowed_scenario_types` before POST /v1/scenarios/generate.
      required: [name]
      properties:
        name:
          type: string
          description: Canonical tag id — pass this string in `tags` / `tag_pool`.
        category:
          type: string
          description: Grouping label.
        description:
          type: string
          description: Capability being measured.
        benchmark_family:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: >
            Benchmark family when set (e.g. agentharm, gaia, qna). Benchmark tags are generally
            info_exchange only; qna tags are interview only and must be the sole tag.
        allowed_scenario_types:
          type: array
          items:
            type: string
            enum: [info_exchange, interview]
          description: >
            Scenario types that may use this tag. Empty array means not selectable. When omitted,
            treat as both info_exchange and interview (UI backward compat).
        custom:
          type: boolean
          description: True when the tag is an organization custom tag (from the org overlay); false for global catalogue tags.
